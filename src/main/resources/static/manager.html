<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagent · 管理后台</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #111111;
            --surface: #1a1a1a;
            --surface-raised: #1f1f1f;
            --border: #2a2a2a;
            --border-light: #333333;
            --text: #e5e5e5;
            --text-secondary: #888888;
            --text-muted: #666666;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-subtle: rgba(59, 130, 246, 0.12);
            --success: #22c55e;
            --success-subtle: rgba(34, 197, 94, 0.12);
            --error: #ef4444;
            --error-subtle: rgba(239, 68, 68, 0.12);
            --warning: #f59e0b;
            --radius: 16px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --sidebar-w: 220px;
            --transition: 0.2s ease-out;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ── */
        .layout {
            display: flex;
            height: 100%;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-brand {
            padding: 20px 20px 16px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.03em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px rgba(59,130,246,0.4);
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 14px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            user-select: none;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.04);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .nav-item.active svg {
            opacity: 1;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 8px;
            border-radius: var(--radius-xs);
            transition: color var(--transition);
        }

        .sidebar-link:hover { color: var(--text-secondary); }

        .sidebar-link svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .main-header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .main-header h1 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .main-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .main-body {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
        }

        /* ── Panel visibility ── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Upload Zone ── */
        .upload-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: 0.03em;
        }

        .upload-zone {
            border: 2px dashed var(--border-light);
            border-radius: var(--radius);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--surface);
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-subtle);
        }

        .upload-zone.uploading {
            pointer-events: none;
            opacity: 0.7;
            border-color: var(--accent);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: var(--accent-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-icon svg {
            width: 24px;
            height: 24px;
            color: var(--accent);
        }

        .upload-zone h3 {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }

        .upload-zone p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .upload-hint {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .file-input { display: none; }

        /* ── Upload Result ── */
        .upload-result {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            display: none;
            animation: slideIn 0.25s ease-out;
        }

        .upload-result.success {
            display: block;
            background: var(--success-subtle);
            border: 1px solid rgba(34,197,94,0.25);
            color: var(--success);
        }

        .upload-result.error {
            display: block;
            background: var(--error-subtle);
            border: 1px solid rgba(239,68,68,0.25);
            color: var(--error);
        }

        .upload-result .result-icon {
            font-weight: 700;
            margin-right: 6px;
        }

        /* ── Doc List ── */
        .doc-list-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .doc-list-empty .empty-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Progress bar ── */
        .progress-bar {
            margin-top: 12px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active { display: block; }

        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            animation: progressPulse 1.5s ease-in-out infinite;
            width: 40%;
        }

        /* ── Search ── */
        .search-bar-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        .search-input-wrap {
            flex: 1;
            position: relative;
        }

        .search-input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 16px 11px 42px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color var(--transition);
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder { color: #555; }

        .results-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color var(--transition);
        }

        .results-select:focus { border-color: var(--accent); }

        .search-btn {
            padding: 11px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .search-btn:hover { background: var(--accent-hover); }
        .search-btn:active { transform: scale(0.97); }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Mode Toggle ── */
        .mode-toggle-row {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            width: fit-content;
        }

        .mode-option {
            padding: 7px 16px;
            font-size: 13px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
        }

        .mode-option:first-child { border-right: 1px solid var(--border); }
        .mode-option.active {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        /* ── Search Results ── */
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-bottom: 10px;
            animation: slideIn 0.25s ease-out;
            transition: border-color var(--transition);
        }

        .result-card:hover { border-color: var(--border-light); }

        .result-index {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .result-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
            text-wrap: pretty;
            word-break: break-word;
        }

        .result-score {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-bar {
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.4s ease-out;
        }

        .result-empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .result-loading {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }

        /* ── Search History ── */
        .history-section {
            margin-top: 28px;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .history-header h4 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .history-clear {
            font-size: 12px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: color var(--transition);
        }

        .history-clear:hover { color: var(--error); }

        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-tag {
            padding: 5px 12px;
            font-size: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
        }

        .history-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Toasts ── */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            z-index: 100;
            animation: slideIn 0.25s ease-out;
            pointer-events: none;
            max-width: 360px;
        }

        .toast.success {
            background: #065f46;
            color: #6ee7b7;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .toast.error {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
        }

        /* ── Animations ── */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes progressPulse {
            0%, 100% { margin-left: 0; }
            50% { margin-left: 60%; }
        }

        /* ── Scrollbar ── */
        .main-body::-webkit-scrollbar { width: 6px; }
        .main-body::-webkit-scrollbar-track { background: transparent; }
        .main-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .sidebar { width: 56px; }
            .sidebar-brand { padding: 16px 12px; font-size: 0; gap: 0; justify-content: center; }
            .sidebar-brand-dot { width: 12px; height: 12px; }
            .nav-item { justify-content: center; padding: 10px; font-size: 0; gap: 0; }
            .nav-item svg { width: 20px; height: 20px; }
            .sidebar-footer { display: none; }
            .main-body { padding: 16px; }
            .search-bar-row { flex-direction: column; }
            .upload-zone { padding: 32px 16px; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- ── Sidebar ── -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-brand-dot"></span>
                Jagent
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-panel="documents">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    <span>文档管理</span>
                </button>
                <button class="nav-item" data-panel="search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <span>语义检索</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <a href="/" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                    </svg>
                    返回对话
                </a>
            </div>
        </aside>

        <!-- ── Main ── -->
        <main class="main">
            <div class="main-header">
                <h1 id="panelTitle">文档管理</h1>
                <p id="panelSubtitle">上传文档到知识库，然后通过语义检索查找相关内容</p>
            </div>
            <div class="main-body">

                <!-- ════ 文档管理 Panel ════ -->
                <div class="panel active" id="panel-documents">
                    <div class="upload-section">
                        <div class="section-title">上传文档</div>
                        <div class="upload-zone" id="uploadZone">
                            <div class="upload-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                            </div>
                            <h3>拖拽文件到此处，或点击选择</h3>
                            <p>支持 PDF、TXT 格式</p>
                            <div class="progress-bar" id="progressBar">
                                <div class="fill"></div>
                            </div>
                        </div>
                        <input type="file" class="file-input" id="fileInput" accept=".pdf,.txt,text/plain,application/pdf">
                        <div class="upload-result" id="uploadResult"></div>
                    </div>

                    <div class="section-title">本次已上传文档</div>
                    <div class="doc-list-empty" id="docList">
                        <div class="empty-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
                                <rect x="2" y="3" width="20" height="14" rx="2"/>
                                <line x1="8" y1="21" x2="16" y2="21"/>
                                <line x1="12" y1="17" x2="12" y2="21"/>
                            </svg>
                        </div>
                        暂无文档，上传后在此处查看
                    </div>
                </div>

                <!-- ════ 语义检索 Panel ════ -->
                <div class="panel" id="panel-search">
                    <div class="search-bar-row">
                        <div class="search-input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                            <input
                                type="text"
                                class="search-input"
                                id="searchInput"
                                placeholder="输入查询内容，探索知识库…"
                                autocomplete="off"
                            >
                        </div>
                        <select class="results-select" id="resultsSelect">
                            <option value="3">3 条结果</option>
                            <option value="5" selected>5 条结果</option>
                            <option value="10">10 条结果</option>
                            <option value="20">20 条结果</option>
                        </select>
                        <button class="search-btn" id="searchBtn">检索</button>
                    </div>

                    <div class="mode-toggle-row" id="modeToggleRow">
                        <button class="mode-option active" data-mode="simple">简洁</button>
                        <button class="mode-option" data-mode="detail">详细分数</button>
                    </div>

                    <div id="searchResults"></div>

                    <div class="history-section" id="historySection">
                        <div class="history-header">
                            <h4>搜索历史</h4>
                            <button class="history-clear" id="clearHistory">清除记录</button>
                        </div>
                        <div class="history-tags" id="historyTags"></div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
    (function() {
        // ── Navigation ──
        const navItems = document.querySelectorAll('.nav-item');
        const panels = {
            documents: document.getElementById('panel-documents'),
            search: document.getElementById('panel-search'),
        };
        const panelTitle = document.getElementById('panelTitle');
        const panelSubtitle = document.getElementById('panelSubtitle');
        const panelMeta = {
            documents: { title: '文档管理', subtitle: '上传文档到知识库，然后通过语义检索查找相关内容' },
            search:    { title: '语义检索', subtitle: '基于向量相似度搜索知识库中的相关片段' },
        };

        navItems.forEach(btn => {
            btn.addEventListener('click', () => {
                const panel = btn.dataset.panel;
                navItems.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                Object.values(panels).forEach(p => p.classList.remove('active'));
                panels[panel].classList.add('active');
                panelTitle.textContent = panelMeta[panel].title;
                panelSubtitle.textContent = panelMeta[panel].subtitle;
                if (panel === 'search') {
                    document.getElementById('searchInput').focus();
                    renderHistory();
                }
            });
        });

        // ── Upload ──
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const progressBar = document.getElementById('progressBar');
        const uploadResult = document.getElementById('uploadResult');
        const docList = document.getElementById('docList');
        let uploadedFiles = [];

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
            fileInput.value = '';
        });

        async function handleFile(file) {
            const validExts = ['.pdf', '.txt'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!validExts.includes(ext)) {
                showResult('error', '不支持的文件格式，仅支持 PDF 和 TXT');
                return;
            }

            uploadZone.classList.add('uploading');
            progressBar.classList.add('active');
            uploadResult.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/manager/document/upload', {
                    method: 'POST',
                    body: formData,
                });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    showResult('success', `「${data.filename}」摄入成功`);
                    uploadedFiles.push({ name: data.filename, time: new Date() });
                    renderDocList();
                } else {
                    showResult('error', data.message || '上传失败');
                }
            } catch (err) {
                showResult('error', '网络错误：无法连接到服务');
            } finally {
                uploadZone.classList.remove('uploading');
                progressBar.classList.remove('active');
            }
        }

        function showResult(type, message) {
            uploadResult.className = 'upload-result ' + type;
            const icon = type === 'success' ? '&#10003;' : '&#10007;';
            uploadResult.innerHTML = `<span class="result-icon">${icon}</span> ${escapeHtml(message)}`;
            if (type === 'success') {
                setTimeout(() => { uploadResult.style.display = 'none'; }, 5000);
            }
        }

        function renderDocList() {
            if (uploadedFiles.length === 0) {
                docList.innerHTML = `
                    <div class="empty-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                    </div>
                    暂无文档，上传后在此处查看
                `;
                return;
            }
            docList.innerHTML = uploadedFiles.map((f, i) => `
                <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;
                            border-bottom:1px solid var(--border);font-size:13px;">
                    <span style="color:var(--text-muted);font-size:12px;min-width:24px;">#${i + 1}</span>
                    <span style="flex:1;color:var(--text);">${escapeHtml(f.name)}</span>
                    <span style="color:var(--text-muted);font-size:12px;">${timeAgo(f.time)}</span>
                </div>
            `).join('');
        }

        function timeAgo(date) {
            const sec = Math.floor((Date.now() - date.getTime()) / 1000);
            if (sec < 60) return '刚刚';
            if (sec < 3600) return Math.floor(sec / 60) + ' 分钟前';
            return Math.floor(sec / 3600) + ' 小时前';
        }

        // ── Search ──
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsSelect = document.getElementById('resultsSelect');
        const searchResults = document.getElementById('searchResults');
        const modeOptions = document.querySelectorAll('.mode-option');
        let searchMode = 'simple';
        const HISTORY_KEY = 'jagent_search_history';

        modeOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                modeOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                searchMode = opt.dataset.mode;
                rerenderResults();
            });
        });

        let lastResults = null;

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        searchBtn.addEventListener('click', doSearch);

        async function doSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            const maxResults = parseInt(resultsSelect.value);
            searchBtn.disabled = true;
            searchResults.innerHTML = '<div class="result-loading">搜索中…</div>';

            const formData = new URLSearchParams();
            formData.set('query', query);
            formData.set('maxResults', maxResults);

            try {
                const res = await fetch('/api/manager/search/detail', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString(),
                });
                if (!res.ok) throw new Error('Search failed');
                lastResults = await res.json();
                addHistory(query);
                renderResults(lastResults);
            } catch (err) {
                searchResults.innerHTML = '<div class="result-empty">检索失败，请确认服务已启动</div>';
            } finally {
                searchBtn.disabled = false;
            }
        }

        function renderResults(results) {
            if (!results || results.length === 0) {
                searchResults.innerHTML = '<div class="result-empty">未找到相关结果，试换一个查询词</div>';
                return;
            }

            searchResults.innerHTML = results.map((r, i) => {
                const score = (r.score * 100).toFixed(1);
                if (searchMode === 'simple') {
                    return `
                        <div class="result-card">
                            <div class="result-index">结果 #${i + 1}</div>
                            <div class="result-text">${escapeHtml(r.text)}</div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="result-card">
                            <div class="result-index">结果 #${i + 1}</div>
                            <div class="result-text">${escapeHtml(r.text)}</div>
                            <div class="result-score">
                                相似度 ${score}%
                                <div class="score-bar">
                                    <div class="score-bar-fill" style="width:${Math.min(score, 100)}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function rerenderResults() {
            if (lastResults) renderResults(lastResults);
        }

        // ── Search History ──
        function loadHistory() {
            try {
                return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            } catch { return []; }
        }

        function saveHistory(list) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
        }

        function addHistory(query) {
            let list = loadHistory().filter(h => h !== query);
            list.unshift(query);
            if (list.length > 12) list = list.slice(0, 12);
            saveHistory(list);
            renderHistory();
        }

        function renderHistory() {
            const list = loadHistory();
            const container = document.getElementById('historyTags');
            const section = document.getElementById('historySection');

            if (list.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = '';
            container.innerHTML = list.map(q =>
                `<span class="history-tag" data-query="${escapeHtml(q)}">${escapeHtml(q)}</span>`
            ).join('');

            container.querySelectorAll('.history-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    searchInput.value = tag.dataset.query;
                    doSearch();
                });
            });
        }

        document.getElementById('clearHistory').addEventListener('click', () => {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        });

        // ── Helpers ──
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return String(text).replace(/[&<>"']/g, c => map[c]);
        }

        // ── Init ──
        renderHistory();
    })();
    </script>
</body>
</html>
