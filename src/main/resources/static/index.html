<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #111111;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #e5e5e5;
            --text-secondary: #888888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --user-bubble: #1d3b5c;
            --ai-bubble: #262626;
            --radius: 16px;
            --radius-sm: 8px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 768px;
            margin: 0 auto;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.02em;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .header-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .mode-toggle.streaming {
            border-color: #22c55e;
            color: #22c55e;
        }

        .btn-new-session {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-new-session:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: messageIn 0.3s ease-out;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            padding: 0 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .message.user .message-label {
            text-align: right;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            text-wrap: pretty;
            word-break: break-word;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: var(--radius-sm);
            color: #d0e0ff;
        }

        .message.ai .bubble {
            background: var(--ai-bubble);
            border-bottom-left-radius: var(--radius-sm);
            color: var(--text);
        }

        .message-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 0.03em;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
            align-items: center;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: dotPulse 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        .input-bar {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-bar textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
            transition: border-color 0.2s;
            field-sizing: content;
        }

        .input-bar textarea:focus {
            border-color: var(--accent);
        }

        .input-bar textarea::placeholder {
            color: #555;
        }

        .btn-send, .btn-stop {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
        }

        .btn-send {
            background: var(--accent);
            color: white;
        }

        .btn-send:hover {
            background: var(--accent-hover);
        }

        .btn-send:active {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-stop {
            background: #dc2626;
            color: white;
            display: none;
        }

        .btn-stop:hover {
            background: #b91c1c;
        }

        .btn-stop.visible {
            display: flex;
        }

        .btn-send.hidden {
            display: none;
        }

        .btn-send svg, .btn-stop svg {
            width: 18px;
            height: 18px;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes dotPulse {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            30% {
                opacity: 1;
                transform: scale(1.3);
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <span class="header-dot"></span>
            DeepSeek Chat
            <span class="header-right">
                <button class="btn-new-session" id="newSessionBtn" title="新建会话">+ 新会话</button>
                <button class="mode-toggle streaming" id="modeToggle" title="切换流式/非流式">
                    流式
                </button>
            </span>
        </div>

        <div class="messages" id="messages">
            <div class="message-empty" id="emptyHint">输入消息开始对话</div>
        </div>

        <div class="input-bar">
            <textarea
                id="input"
                placeholder="输入消息，Enter 发送"
                rows="1"
                autofocus
            ></textarea>
            <button class="btn-send" id="sendBtn" title="发送">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
            <button class="btn-stop" id="stopBtn" title="停止生成">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="6" width="12" height="12" rx="1" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const emptyHint = document.getElementById('emptyHint');
        const modeToggle = document.getElementById('modeToggle');

        let streamingMode = true;
        let abortController = null;
        let eventSource = null;
        let currentStreamBubble = null;
        let sessionId = Date.now();

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideEmptyHint() {
            if (emptyHint) emptyHint.style.display = 'none';
        }

        function addMessage(role, text) {
            hideEmptyHint();
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-label">${role === 'user' ? 'You' : 'AI'}</div>
                <div class="bubble">${escapeHtml(text)}</div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        function createStreamBubble() {
            hideEmptyHint();
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'streaming-bubble';
            div.innerHTML = `
                <div class="message-label">AI</div>
                <div class="bubble"><span class="typing-indicator"><span></span><span></span><span></span></span></div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return text.replace(/[&<>"']/g, c => map[c]);
        }

        function setSending(state) {
            if (state) {
                sendBtn.classList.add('hidden');
                stopBtn.classList.add('visible');
                inputEl.disabled = true;
            } else {
                sendBtn.classList.remove('hidden');
                stopBtn.classList.remove('visible');
                inputEl.disabled = false;
                inputEl.focus();
            }
        }

        function finishStreamBubble() {
            const el = document.getElementById('streaming-bubble');
            if (el) el.removeAttribute('id');
        }

        // ---- Non-streaming ----
        async function sendBlocking(text) {
            const url = `/api/chat?sessionId=${sessionId}&message=${encodeURIComponent(text)}`;
            const res = await fetch(url, { signal: abortController.signal });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.text();
        }

        // ---- Streaming (EventSource) ----
        function sendStreaming(text, bubbleEl) {
            return new Promise((resolve, reject) => {
                const url = `/api/chat/stream?sessionId=${sessionId}&message=${encodeURIComponent(text)}`;
                eventSource = new EventSource(url);
                let firstToken = true;
                let done = false;

                const cleanup = () => {
                    if (done) return;
                    done = true;
                    eventSource.close();
                    eventSource = null;
                    resolve();
                };

                // 监听 abort 信号，用户点击停止时触发
                abortController.signal.addEventListener('abort', cleanup);

                eventSource.onmessage = (e) => {
                    if (firstToken) {
                        bubbleEl.textContent = '';
                        firstToken = false;
                    }
                    bubbleEl.textContent += e.data;
                    scrollToBottom();
                };

                eventSource.addEventListener('done', cleanup);

                eventSource.onerror = () => {
                    eventSource.close();
                    eventSource = null;
                    if (firstToken) {
                        reject(new Error('SSE connection failed'));
                    } else {
                        resolve();
                    }
                };
            });
        }

        async function send() {
            const text = inputEl.value.trim();
            if (!text) return;

            abortController = new AbortController();
            setSending(true);
            inputEl.value = '';
            inputEl.style.height = 'auto';

            addMessage('user', text);
            currentStreamBubble = createStreamBubble();
            const bubbleEl = currentStreamBubble.querySelector('.bubble');

            try {
                if (streamingMode) {
                    await sendStreaming(text, bubbleEl);
                } else {
                    const reply = await sendBlocking(text);
                    bubbleEl.textContent = reply;
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    if (!bubbleEl.textContent || bubbleEl.textContent === '') {
                        bubbleEl.textContent = '[已取消]';
                    }
                } else {
                    currentStreamBubble.remove();
                    addMessage('ai', '请求失败，请确认服务已启动。');
                }
            }

            finishStreamBubble();
            currentStreamBubble = null;
            abortController = null;
            eventSource = null;
            setSending(false);
        }

        function stop() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            if (abortController) {
                abortController.abort();
            }
            // 直接恢复 UI，因为 close() / abort() 可能不触发 Promise 决议
            finishStreamBubble();
            currentStreamBubble = null;
            abortController = null;
            setSending(false);
        }

        function newSession() {
            sessionId = Date.now();
            messagesEl.querySelectorAll('.message').forEach(el => el.remove());
            const el = document.getElementById('streaming-bubble');
            if (el) el.remove();
            if (emptyHint) emptyHint.style.display = '';
            inputEl.focus();
        }

        // ---- Mode toggle ----
        modeToggle.addEventListener('click', () => {
            streamingMode = !streamingMode;
            if (streamingMode) {
                modeToggle.textContent = '流式';
                modeToggle.classList.add('streaming');
            } else {
                modeToggle.textContent = '非流式';
                modeToggle.classList.remove('streaming');
            }
        });

        // ---- Input events ----
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!abortController && !eventSource) send();
            }
        });

        sendBtn.addEventListener('click', send);
        stopBtn.addEventListener('click', stop);
        newSessionBtn.addEventListener('click', newSession);
    </script>
</body>
</html>
